<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life in Four · Rooted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#FAF7F2;font-family:'Lato',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.wrap{text-align:center;max-width:380px;width:100%;}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(36px,9vw,52px);font-weight:300;color:#3D2B1F;line-height:1.05;margin-bottom:6px;}
.sub{font-family:'Lato',sans-serif;font-size:10px;letter-spacing:.32em;color:#6B8F6B;text-transform:uppercase;margin-bottom:32px;}
.rule{width:40px;height:1px;background:#C9A882;margin:0 auto 32px;}
.prompt{font-size:14px;color:#6B4A36;font-weight:300;line-height:1.8;margin-bottom:36px;}
.btns{display:flex;flex-direction:column;gap:14px;}
.btn{display:block;padding:16px 24px;text-decoration:none;border:1px solid rgba(61,43,31,.2);transition:all .25s;cursor:pointer;}
.btn-zh{background:#3D2B1F;color:#FAF7F2;}
.btn-zh:hover{background:#6B4A36;}
.btn-en{background:transparent;color:#3D2B1F;}
.btn-en:hover{background:#F5EDE0;}
.btn-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:300;display:block;margin-bottom:3px;}
.btn-desc{font-size:11px;letter-spacing:.12em;color:inherit;opacity:.7;}
.btn-en .btn-desc{color:#6B4A36;}
.tag{margin-top:36px;font-size:10px;letter-spacing:.2em;color:#9A7A68;}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Life in Four</div>
  <div class="sub">Rooted · 認識此刻的你</div>
  <div class="rule"></div>
  <p class="prompt">選擇你的語言<br>Choose your language</p>
  <div class="btns">
    <a class="btn btn-zh" href="life-in-four.html">
      <span class="btn-title">中文版</span>
      <span class="btn-desc">繁體中文</span>
    </a>
    <a class="btn btn-en" href="life-in-four-en.html">
      <span class="btn-title">English</span>
      <span class="btn-desc">English version</span>
    </a>
  </div>
  <div class="tag">@fugilife</div>
</div>
</body>
</html>
